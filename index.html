<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>MySocial Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

/* =========================
ROOT
========================= */

:root{

--bg:#f8fafc;
--card:#ffffffee;
--primary:#1877f2;
--secondary:#c084fc;
--text:#0f172a;
--muted:#94a3b8;

--shadow:
0 8px 24px rgba(15,23,42,0.08);

}

/* =========================
GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:var(--bg);
color:var(--text);

overflow-x:hidden;

padding-bottom:120px;

}

/* =========================
ANIMATIONS
========================= */

@keyframes fadeSlideUp{

0%{
opacity:0;
transform:translateY(14px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

100%{
transform:scale(1);
}

}

@keyframes navPop{

0%{
transform:scale(.9);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* =========================
HEADER
========================= */

.topbar{

position:fixed;

top:0;
left:0;

width:100%;
height:72px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 18px;

background:rgba(255,255,255,0.78);

backdrop-filter:blur(16px);

z-index:99999;

border-bottom:1px solid rgba(255,255,255,0.4);

}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-circle{

width:48px;
height:48px;

border-radius:50%;

background:linear-gradient(135deg,#1877f2,#c084fc);

display:flex;
align-items:center;
justify-content:center;

color:#fff;
font-size:20px;

box-shadow:
0 12px 24px rgba(24,119,242,0.25);

animation:pulse 4s infinite;

}

.logo h4{
margin:0;
font-weight:800;
letter-spacing:-0.5px;
}

.top-icons i{

font-size:20px;
margin-left:18px;
color:#334155;

}

/* =========================
PAGE
========================= */

.page{

display:none;

padding-top:88px;

animation:fadeSlideUp .35s ease;

}

.active-page{
display:block;
}

/* =========================
POST CARD
========================= */

.post-card{

background:#fff;

margin:16px;

padding:18px;

border-radius:32px;

box-shadow:var(--shadow);

transition:.25s;

border:1px solid rgba(255,255,255,0.5);

}

.post-card:hover{

transform:translateY(-2px);

box-shadow:
0 18px 30px rgba(0,0,0,0.08);

}

/* =========================
POST TOP
========================= */

.post-top{

display:flex;
align-items:center;
gap:12px;

}

/* =========================
PROFILE IMAGE
========================= */

.post-profile{

width:54px;
height:54px;

min-width:54px;
min-height:54px;

border-radius:50%;

object-fit:cover;

display:block;

padding:2px;

background:
linear-gradient(135deg,#1877f2,#c084fc);

border:3px solid #fff;

box-shadow:
0 4px 12px rgba(24,119,242,0.18),
0 2px 6px rgba(0,0,0,0.08);

overflow:hidden;

}

.post-name{
font-weight:700;
font-size:15px;
}

.post-time{
font-size:12px;
color:#94a3b8;
margin-top:2px;
}

/* =========================
MEDIA
========================= */

.post-media{

margin-top:16px;

border-radius:26px;

overflow:hidden;

background:#000;

position:relative;

}

.post-media img{

width:100%;

max-height:520px;

object-fit:cover;

display:block;

}

.video-wrapper{

position:relative;

width:100%;

overflow:hidden;

background:#000;

border-radius:26px;

}

.video-wrapper iframe{

width:100%;
height:340px;

border:none;

display:block;

background:#000;

}

@media(max-width:560px){

.video-wrapper iframe{
height:250px !important;
}

}

/* =========================
CAPTION
========================= */

.post-caption{

margin-top:14px;

font-size:15px;

line-height:1.6;

color:#334155;

}

/* =========================
POST ACTIONS
========================= */

.post-actions{

display:flex;
justify-content:space-between;
align-items:center;

margin-top:18px;

}

.like-btn{

display:flex;
align-items:center;
gap:6px;

font-weight:700;

color:#e11d48;

cursor:pointer;

transition:.2s;

}

.like-btn i{
transition:.2s;
}

.like-btn:active i{
transform:scale(1.2);
}

.points{

font-weight:700;

background:
linear-gradient(135deg,#f59e0b,#facc15);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
FORM BOX
========================= */

.box{

background:#fff;

margin:16px;

padding:22px;

border-radius:32px;

box-shadow:var(--shadow);

}

.box h4{
font-weight:800;
margin-bottom:12px;
}

/* =========================
INPUT
========================= */

.form-control{

border:none;

border-radius:24px;

padding:15px 18px;

margin-top:14px;

background:#f8fafc;

font-size:15px;

}

.form-control:focus{

box-shadow:
0 0 0 4px rgba(24,119,242,0.12);

}

/* =========================
BUTTON
========================= */

.main-btn{

width:100%;

height:56px;

border:none;

border-radius:32px;

margin-top:16px;

background:
linear-gradient(135deg,#1877f2,#c084fc);

color:#fff;

font-weight:700;

font-size:15px;

box-shadow:
0 10px 20px rgba(24,119,242,0.18);

transition:.2s;

}

.main-btn:active{
transform:scale(.97);
}

/* =========================
BOTTOM NAV
========================= */

.bottom-nav{

position:fixed;

left:12px;
right:12px;
bottom:12px;

height:76px;

background:
rgba(255,255,255,0.86);

backdrop-filter:blur(18px);

display:flex;
justify-content:space-around;
align-items:center;

border-radius:40px;

box-shadow:
0 12px 32px rgba(0,0,0,0.10);

z-index:999999;

padding:0 8px;

border:
1px solid rgba(255,255,255,0.5);

animation:navPop .4s ease;

}

.nav-btn{

flex:1;

height:58px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:4px;

font-size:11px;
font-weight:700;

color:#64748b;

border-radius:26px;

transition:.25s;

position:relative;

overflow:hidden;

}

.nav-btn i{

font-size:22px;

transition:.25s;

}

.nav-active{

background:
rgba(24,119,242,0.10);

color:#1877f2;

transform:translateY(-2px);

}

.nav-active i{

transform:scale(1.12);

}

.nav-btn:active{
transform:scale(.95);
}

/* =========================
PREMIUM ACCOUNT DESIGN
========================= */

.premium-profile{

background:#fff;

margin:16px;

border-radius:32px;

overflow:hidden;

box-shadow:var(--shadow);

padding-bottom:24px;

}

.profile-cover{

height:130px;

background:
linear-gradient(135deg,#1877f2,#c084fc,#ff4fd8);

}

.profile-photo-wrap{

position:relative;

width:120px;
height:120px;

margin:auto;

margin-top:-60px;

}

.main-profile-photo{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:5px solid #fff;

background:#fff;

display:block;

box-shadow:
0 10px 25px rgba(0,0,0,0.15);

}

.online-dot{

position:absolute;

right:8px;
bottom:8px;

width:20px;
height:20px;

background:#22c55e;

border-radius:50%;

border:3px solid #fff;

}

.profile-name{

margin-top:18px;

font-weight:800;

font-size:24px;

text-align:center;

}

.user-id{

text-align:center;

font-size:13px;

color:#94a3b8;

margin-top:4px;

}

.profile-bio{

text-align:center;

padding:0 20px;

margin-top:14px;

font-size:14px;

line-height:1.7;

color:#475569;

}

.premium-stats{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:14px;

padding:20px;

}

.premium-stat{

background:#f8fafc;

padding:18px;

border-radius:24px;

text-align:center;

}

.premium-stat i{

font-size:20px;

color:#1877f2;

margin-bottom:10px;

}

.premium-stat h5{

margin:0;

font-size:22px;

font-weight:800;

}

.premium-stat span{

font-size:13px;

color:#94a3b8;

}

.wallet-card{

margin:0 20px;

padding:22px;

border-radius:28px;

background:
linear-gradient(135deg,#f59e0b,#facc15);

display:flex;

justify-content:space-between;
align-items:center;

color:#fff;

}

.wallet-title{

font-size:13px;

}

.wallet-points{

font-size:28px;

font-weight:800;

margin-top:4px;

}

.wallet-icon{

font-size:34px;

}

.account-details-box{

margin:20px;

background:#fff;

padding:22px;

border-radius:28px;

box-shadow:
0 8px 24px rgba(0,0,0,0.05);

}

.account-details-box h4{

font-weight:800;

margin-bottom:18px;

}

.detail-item{

display:flex;
align-items:center;
gap:14px;

padding:14px 0;

border-bottom:1px solid #f1f5f9;

font-size:15px;

}

.detail-item:last-child{
border:none;
}

.detail-item i{

width:38px;
height:38px;

border-radius:14px;

background:#f8fafc;

display:flex;
align-items:center;
justify-content:center;

color:#1877f2;

}

.update-box{

margin:20px;

background:#fff;

padding:22px;

border-radius:28px;

box-shadow:
0 8px 24px rgba(0,0,0,0.05);

}

.update-box h4{

font-weight:800;

margin-bottom:16px;

}

.logout-btn{

width:calc(100% - 40px);

margin:20px;

height:58px;

border:none;

border-radius:30px;

background:#ef4444;

color:#fff;

font-weight:700;

font-size:15px;

}

.loading{

text-align:center;

padding:40px;

font-weight:700;

color:#64748b;

}

@media(max-width:560px){

.main-profile-photo{
width:104px;
height:104px;
}

.profile-photo-wrap{
width:104px;
height:104px;
}

}

</style>

</head>
<body>

<div class="topbar">

<div class="logo">

<div class="logo-circle">
<i class="fa-solid fa-bolt"></i>
</div>

<h4>MySocial</h4>

</div>

<div class="top-icons">
<i class="fa-regular fa-bell"></i>
<i class="fa-solid fa-magnifying-glass"></i>
</div>

</div>

<div id="homePage" class="page active-page">

<div id="postsArea">

<div class="loading">
<i class="fa-solid fa-circle-notch fa-spin"></i>
Loading Posts...
</div>

</div>

</div>

<div id="createPage" class="page">

<div class="box">

<h4>Create New Post</h4>

<input type="text" id="driveLink" class="form-control" placeholder="Paste Google Drive Photo / Video Link">

<textarea id="caption" class="form-control" rows="4" placeholder="Write your caption..."></textarea>

<button class="main-btn" onclick="createPost()">
<i class="fa-solid fa-paper-plane"></i>
 Publish Post
</button>

</div>

</div>

<div id="accountPage" class="page">

<div id="accountArea"></div>

</div>

<div class="bottom-nav">

<div class="nav-btn nav-active" onclick="showPage('homePage',this)">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</div>

<div class="nav-btn" onclick="showPage('createPage',this)">
<i class="fa-solid fa-plus"></i>
<span>Create</span>
</div>

<div class="nav-btn" onclick="showPage('accountPage',this)">
<i class="fa-solid fa-user"></i>
<span>Account</span>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxeq_mYOwifFb_NM9Eo6QtQqQmJPe4ANdqaHhNbAxJvQp70suNBpmuCH2QcRYh-R7u3ZQ/exec";

function convertProfileLink(url){

try{

let fileId="";

if(url.includes("/d/")){
fileId=url.split("/d/")[1].split("/")[0];
}
else if(url.includes("id=")){
fileId=url.split("id=")[1].split("&")[0];
}

return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;

}catch(e){

return "https://ui-avatars.com/api/?background=random&name=User";

}

}

function extractFileId(url){

try{

if(url.includes("/d/")){
return url.split("/d/")[1].split("/")[0];
}

if(url.includes("id=")){
return url.split("id=")[1].split("&")[0];
}

return "";

}catch(e){

return "";

}

}

function showPage(pageId,btn){

document.querySelectorAll(".page").forEach(page=>{
page.classList.remove("active-page");
});

document.getElementById(pageId).classList.add("active-page");

document.querySelectorAll(".nav-btn").forEach(nav=>{
nav.classList.remove("nav-active");
});

btn.classList.add("nav-active");

if(pageId==="accountPage"){
loadAccount();
}

}

async function loadPosts(){

try{

const res=await fetch(API_URL+"?action=getPosts");

const data=await res.json();

let html="";

if(!data.posts || data.posts.length===0){

html=`<div class="loading">No Posts Yet</div>`;

}else{

data.posts.forEach(post=>{

let media="";

if(post.post_type==="video"){

const fileId=extractFileId(post.original_link);

media=`

<div class="video-wrapper">

<iframe
src="https://drive.google.com/file/d/${fileId}/preview"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

`;

}else{

media=`

<img
src="${post.media_url}"
loading="lazy"
onerror="this.src='https://via.placeholder.com/500x350?text=Image+Not+Found'"
>

`;

}

html+=`

<div class="post-card">

<div class="post-top">

<img 

class="post-profile"

src="${convertProfileLink(post.profile_photo)}"

onerror="this.src='https://ui-avatars.com/api/?background=random&name=${post.user_name}'"

>

<div>

<div class="post-name">
${post.user_name}
</div>

<div class="post-time">
${post.date} • ${post.time}
</div>

</div>

</div>

<div class="post-media">
${media}
</div>

<div class="post-caption">
${post.caption || ""}
</div>

<div class="post-actions">

<div class="like-btn" onclick="likePost('${post.post_id}')">
<i class="fa-solid fa-heart"></i>
${post.likes || 0}
</div>

<div class="points">
⭐ ${post.points || 0}
</div>

</div>

</div>

`;

});

}

document.getElementById("postsArea").innerHTML=html;

}catch(err){

document.getElementById("postsArea").innerHTML=`Failed`;

}

}

function loadAccount(){

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

document.getElementById("accountArea").innerHTML=`

<div class="box">

<h4>Login</h4>

<input type="text" id="loginMobile" class="form-control" placeholder="Mobile Number">

<input type="password" id="loginPassword" class="form-control" placeholder="Password">

<button class="main-btn" onclick="loginUser()">
Login
</button>

<hr>

<h4 style="margin-top:20px;">Register</h4>

<input type="text" id="regName" class="form-control" placeholder="Full Name">

<input type="text" id="regMobile" class="form-control" placeholder="Mobile Number">

<textarea id="regBio" class="form-control" placeholder="Bio"></textarea>

<input type="text" id="regPhoto" class="form-control" placeholder="Google Drive Profile Photo Link">

<input type="password" id="regPassword" class="form-control" placeholder="Password">

<button class="main-btn" onclick="registerUser()">
Register
</button>

</div>

`;

}else{

document.getElementById("accountArea").innerHTML=`

<div class="premium-profile">

<div class="profile-cover"></div>

<div class="profile-photo-wrap">

<img 
class="main-profile-photo"
src="${convertProfileLink(user.profile_photo)}"
>

<div class="online-dot"></div>

</div>

<h3 class="profile-name">
${user.name}
</h3>

<div class="user-id">
ID : ${user.user_id || "USR001"}
</div>

<p class="profile-bio">
${user.bio || ""}
</p>

<div class="premium-stats">

<div class="premium-stat">
<i class="fa-solid fa-image"></i>
<h5>${user.posts || 0}</h5>
<span>Posts</span>
</div>

<div class="premium-stat">
<i class="fa-solid fa-heart"></i>
<h5>${user.likes || 0}</h5>
<span>Likes</span>
</div>

<div class="premium-stat">
<i class="fa-solid fa-user-group"></i>
<h5>${user.followers || 0}</h5>
<span>Followers</span>
</div>

<div class="premium-stat">
<i class="fa-solid fa-user-plus"></i>
<h5>${user.following || 0}</h5>
<span>Following</span>
</div>

</div>

<div class="wallet-card">

<div>

<div class="wallet-title">
Wallet Balance
</div>

<div class="wallet-points">
⭐ ${user.wallet_points || 0}
</div>

</div>

<i class="fa-solid fa-wallet wallet-icon"></i>

</div>

<div class="account-details-box">

<h4>
<i class="fa-solid fa-user-gear"></i>
 Account Details
</h4>

<div class="detail-item">
<i class="fa-solid fa-phone"></i>
<span>${user.mobile || "Not Added"}</span>
</div>

<div class="detail-item">
<i class="fa-solid fa-lock"></i>
<span>${user.password || "******"}</span>
</div>

</div>

<div class="update-box">

<h4>
<i class="fa-solid fa-pen"></i>
 Update Profile
</h4>

<input 
type="text" 
id="updateName" 
class="form-control"
value="${user.name || ""}"
>

<textarea
id="updateBio"
class="form-control"
rows="3"
>${user.bio || ""}</textarea>

<input 
type="text"
id="updatePhoto"
class="form-control"
value="${user.profile_photo || ""}"
>

<input 
type="password"
id="updatePassword"
class="form-control"
value="${user.password || ""}"
>

<button class="main-btn" onclick="updateProfile()">
Save Changes
</button>

</div>

<button class="logout-btn" onclick="logoutUser()">
Logout
</button>

</div>

`;

}

}

async function createPost(){

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Please Login First");
return;

}

const driveLink=document.getElementById("driveLink").value.trim();

const caption=document.getElementById("caption").value.trim();

const body={

action:"createPost",

user_id:user.user_id,

user_name:user.name,

profile_photo:user.profile_photo,

drive_link:driveLink,

caption:caption

};

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(body)
});

const data=await res.json();

if(data.status){

alert("Post Published");

document.getElementById("driveLink").value="";
document.getElementById("caption").value="";

loadPosts();

}else{

alert("Failed");

}

}

async function likePost(postId){

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Please Login First");
return;

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"likePost",
post_id:postId,
user_id:user.user_id
})
});

loadPosts();

}

async function registerUser(){

const body={

action:"register",

name:document.getElementById("regName").value,

mobile:document.getElementById("regMobile").value,

bio:document.getElementById("regBio").value,

profile_photo:document.getElementById("regPhoto").value,

password:document.getElementById("regPassword").value

};

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(body)
});

const data=await res.json();

alert(data.message || "Registered");

}

async function loginUser(){

const body={

action:"login",

mobile:document.getElementById("loginMobile").value,

password:document.getElementById("loginPassword").value

};

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(body)
});

const data=await res.json();

if(data.status){

localStorage.setItem("user",JSON.stringify(data.user));

alert("Login Success");

loadAccount();

}else{

alert("Login Failed");

}

}

async function updateProfile(){

const currentUser=
JSON.parse(localStorage.getItem("user"));

const body={

action:"updateProfile",

user_id:currentUser.user_id,

name:
document.getElementById("updateName").value,

bio:
document.getElementById("updateBio").value,

profile_photo:
document.getElementById("updatePhoto").value,

password:
document.getElementById("updatePassword").value

};

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(body)
});

const data=await res.json();

if(data.status){

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

alert("Profile Updated");

loadAccount();

}else{

alert("Update Failed");

}

}

function logoutUser(){

localStorage.removeItem("user");

loadAccount();

}

loadPosts();

</script>

</body>
</html>
